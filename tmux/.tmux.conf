set -g mouse on
set -g mode-keys vi
set -g history-limit 50000
set -g set-clipboard on
set -g prefix2 C-a
bind C-a send-prefix -2

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g status-interval 5
set -g status-style "bg=#080808,fg=#8a8a8a"
set -g status-left-style "fg=#080808,bg=#ffff00,bold"
set -g status-right-style "fg=#e4e4e4,bg=#080808"
set -g message-style "bg=#ffff00,fg=#080808,bold"
set -g message-command-style "bg=#080808,fg=#ffff00,bold"
set -g pane-border-style "fg=#303030"
set -g pane-active-border-style "fg=#00afff"

setw -g window-status-separator ""
setw -g window-status-style "fg=#8a8a8a,bg=#080808"
setw -g window-status-format "#[fg=#8a8a8a,bg=#080808] #I #W "
setw -g window-status-current-format "#[fg=#080808,bg=#00afff,bold] #I #W "
setw -g window-status-current-style "fg=#080808,bg=#00afff,bold"
setw -g window-status-activity-style "fg=#e4e4e4,bg=#080808,underscore"
setw -g window-status-bell-style "fg=#ffff00,bg=#080808,bold"

set -g status-left-length 32
set -g status-right-length 96
set -g status-left " #S |"
set -g status-right "#{?client_prefix,PREFIX | ,}#{?mouse,MOUSE | ,}%R | %d %b | #h "

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Convenient selection in copy-mode.
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-c send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
