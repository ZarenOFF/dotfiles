set -g mouse on
set -g mode-keys vi
set -g history-limit 50000
set -g set-clipboard on
set -g prefix2 C-a
bind C-a send-prefix -2

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g status-interval 5
set -g status-style "bg=colour0,fg=colour250"
set -g status-left-style "fg=colour0,bg=colour11,bold"
set -g status-right-style "fg=colour255,bg=colour0"
set -g message-style "bg=colour11,fg=colour0,bold"
set -g message-command-style "bg=colour0,fg=colour11,bold"
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=colour14"

setw -g window-status-separator ""
setw -g window-status-style "fg=colour250,bg=colour0"
setw -g window-status-format "#[fg=colour250,bg=colour0] #I #W "
setw -g window-status-current-format "#[fg=colour0,bg=colour15,bold] #I #W "
setw -g window-status-current-style "fg=colour0,bg=colour15,bold"
setw -g window-status-activity-style "fg=colour255,bg=colour0,underscore"
setw -g window-status-bell-style "fg=colour11,bg=colour0,bold"

set -g status-left-length 32
set -g status-right-length 96
set -g status-left " #S |"
set -g status-right "#{?client_prefix,PREFIX | ,}#{?mouse,MOUSE | ,}%R | %d %b | #h "

bind - split-window -v -c '#{pane_current_path}'
bind _ split-window -h -c '#{pane_current_path}'
bind Enter copy-mode
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Convenient selection in copy-mode.
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-c send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
